name: 🔐 Pipeline DevSecOps

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pipeline:
    name: Build, Segurança e Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ✅ PASSO 1: Já está pronto — Baixar o código
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      # ✅ PASSO 2: Já está pronto — Build
      - name: ⚙️ Build
        run: |
          echo "Verificando arquivos..."
          ls src/
          echo "Build OK!"

      # ✅ PASSO 3: Secrets Scanning com Gitleaks (bloqueia se encontrar secrets)
      - name: 🔑 Secrets Scanning - Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ PASSO 4: SAST com Semgrep (bloqueia se encontrar código inseguro)
      - name: 🔍 Static Analysis SAST - Run Semgrep
        run: |
          pip install semgrep --quiet 
          semgrep scan --config auto --error src/
          
      # ✅ PASSO 5: SCA com Grype (bloqueia se encontrar vulnerabilidades médias ou maiores)
      - name: 📦 SCA - Run Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype dir:. --fail-on medium

      # ✅ PASSO EXTRA 1: Verificação de CVEs conhecidos com OSV-Scanner
      - name: 🛡️ CVE Check - Run OSV-Scanner
        run: |
          docker run --rm -v $PWD:/scan ghcr.io/google/osv-scanner:latest \
            --recursive /scan/src --fail-on=high

      # ✅ PASSO EXTRA 2: DAST com OWASP ZAP
      - name: 🧪 DAST - Teste Dinâmico com OWASP ZAP
        run: |
          docker run -t owasp/zap2docker-stable zap-baseline.py \
            -t http://localhost:5000 -r zap_report.html

      # ✅ PASSO 6: Já está pronto — Deploy (só roda se tudo passar)
      - name: 🌐 Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload para Produção
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src'

      - name: 🚀 Deploy em Produção
        id: deployment
        uses: actions/deploy-pages@v4
